---
# Multimodal RAG — Full stack on K8s Preprod
# Namespace : kns002-16448-preprod-iasouveraine-031
#
# Deploie : Milvus (standalone) + etcd + MinIO + Redis + App Chainlit
# Usage :
#   kubectl apply -f k8s-multimodal-rag.yaml
#   kubectl -n kns002-16448-preprod-iasouveraine-031 port-forward svc/multimodal-rag-ui 8080:8080

# ═══════════════════════════════════════════════════════════════════════
# 1. etcd (requis par Milvus)
# ═══════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-etcd
  namespace: kns002-16448-preprod-iasouveraine-031
  labels:
    app: milvus-etcd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-etcd
  template:
    metadata:
      labels:
        app: milvus-etcd
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.5
          command:
            - etcd
            - -advertise-client-urls=http://0.0.0.0:2379
            - -listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: revision
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
          ports:
            - containerPort: 2379
          resources:
            requests:
              cpu: "250m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: milvus-etcd
  namespace: kns002-16448-preprod-iasouveraine-031
spec:
  selector:
    app: milvus-etcd
  ports:
    - port: 2379
      targetPort: 2379
  type: ClusterIP

# ═══════════════════════════════════════════════════════════════════════
# 2. MinIO (object storage pour Milvus)
# ═══════════════════════════════════════════════════════════════════════
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-minio
  namespace: kns002-16448-preprod-iasouveraine-031
  labels:
    app: milvus-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-minio
  template:
    metadata:
      labels:
        app: milvus-minio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      containers:
        - name: minio
          image: minio/minio:RELEASE.2023-03-13T19-46-17Z
          command:
            - minio
            - server
            - /data
          env:
            - name: MINIO_ACCESS_KEY
              value: minioadmin
            - name: MINIO_SECRET_KEY
              value: minioadmin
          ports:
            - containerPort: 9000
          resources:
            requests:
              cpu: "250m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: milvus-minio
  namespace: kns002-16448-preprod-iasouveraine-031
spec:
  selector:
    app: milvus-minio
  ports:
    - port: 9000
      targetPort: 9000
  type: ClusterIP

# ═══════════════════════════════════════════════════════════════════════
# 3. Milvus standalone
# ═══════════════════════════════════════════════════════════════════════
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
  namespace: kns002-16448-preprod-iasouveraine-031
  labels:
    app: milvus-standalone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-standalone
  template:
    metadata:
      labels:
        app: milvus-standalone
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.4.0
          command: ["milvus", "run", "standalone"]
          env:
            - name: ETCD_ENDPOINTS
              value: milvus-etcd:2379
            - name: MINIO_ADDRESS
              value: milvus-minio:9000
          ports:
            - containerPort: 19530
            - containerPort: 9091
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 10

---
apiVersion: v1
kind: Service
metadata:
  name: milvus-standalone
  namespace: kns002-16448-preprod-iasouveraine-031
spec:
  selector:
    app: milvus-standalone
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: health
      port: 9091
      targetPort: 9091
  type: ClusterIP

# ═══════════════════════════════════════════════════════════════════════
# 4. Redis
# ═══════════════════════════════════════════════════════════════════════
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multimodal-rag-redis
  namespace: kns002-16448-preprod-iasouveraine-031
  labels:
    app: multimodal-rag-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multimodal-rag-redis
  template:
    metadata:
      labels:
        app: multimodal-rag-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - 512mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: multimodal-rag-redis
  namespace: kns002-16448-preprod-iasouveraine-031
spec:
  selector:
    app: multimodal-rag-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

# ═══════════════════════════════════════════════════════════════════════
# 5. App Chainlit (multimodal-rag)
# ═══════════════════════════════════════════════════════════════════════
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multimodal-rag-app
  namespace: kns002-16448-preprod-iasouveraine-031
  labels:
    app: multimodal-rag-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multimodal-rag-app
  template:
    metadata:
      labels:
        app: multimodal-rag-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      containers:
        - name: app
          image: yvesloic6/multimodal-rag:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MILVUS_HOST
              value: milvus-standalone
            - name: MILVUS_PORT
              value: "19530"
            - name: REDIS_URL
              value: redis://multimodal-rag-redis:6379
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: multimodal-rag-secrets
                  key: openai-api-key
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token-preprod
                  key: token
            - name: HF_HOME
              value: /.cache/huggingface
            - name: MILVUS_COLLECTION
              value: multimodal_rag
            - name: REDIS_TTL
              value: "3600"
            - name: CACHE_SIMILARITY_THRESHOLD
              value: "0.92"
            - name: EMBEDDING_MODEL_TEXT
              value: BAAI/bge-m3
            - name: EMBEDDING_MODEL_IMAGE
              value: openai/clip-vit-base-patch32
            - name: RERANKER_MODEL
              value: cross-encoder/ms-marco-MiniLM-L-6-v2
            - name: TOP_K_RETRIEVAL
              value: "5"
            - name: TOP_K_RERANK
              value: "3"
            - name: CHUNK_SIZE
              value: "512"
            - name: CHUNK_OVERLAP
              value: "50"
            - name: OLLAMA_BASE_URL
              value: http://localhost:11434
            - name: OLLAMA_MODEL
              value: llava:13b
            - name: LOG_LEVEL
              value: INFO
            - name: LOG_FORMAT
              value: text
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 16Gi
          volumeMounts:
            - mountPath: /.cache
              name: hf-cache
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: huggingface-cache-preprod-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: multimodal-rag-ui
  namespace: kns002-16448-preprod-iasouveraine-031
  labels:
    app: multimodal-rag-app
spec:
  selector:
    app: multimodal-rag-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
